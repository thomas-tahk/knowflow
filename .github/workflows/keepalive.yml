# Keeps the Supabase project from auto-pausing, and doubles as uptime monitoring.
#
# Supabase Free Plan projects pause after ~7 days of insufficient database activity, and a
# paused project does NOT wake on request — someone must resume it from the dashboard. A
# service desk consults flows during incidents rather than daily, which is exactly the usage
# profile that gets paused.
#
# The request goes through the app's own API rather than straight at Supabase so it exercises
# the real user path (Vercel function -> password gate -> database query). `curl --fail` then
# makes any breakage a failed workflow run, which GitHub emails about.
#
# Setup: add repository secrets APP_URL (e.g. https://knowflow.vercel.app) and APP_PASSWORD.
#
# NOTE: GitHub disables scheduled workflows in repositories with no commits for 60 days, which
# would silently stop this. workflow_dispatch allows a manual re-trigger.
name: Keep Supabase awake

on:
  schedule:
    - cron: '17 14 * * *' # daily, off the hour to avoid GitHub's peak-minute queueing
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Query the shared library
        run: |
          if [ -z "${{ secrets.APP_URL }}" ]; then
            echo "APP_URL secret is not set — nothing to ping."
            exit 1
          fi
          curl --fail --silent --show-error --max-time 30 \
            -H "x-app-password: ${{ secrets.APP_PASSWORD }}" \
            "${{ secrets.APP_URL }}/api/docs" -o /dev/null
          echo "Shared library responded."
